<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luna ✦ Cat Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --yes-bg:#e8faf2;--yes-border:#7dcca8;--yes-text:#236648;
    --no-bg:#fff0f6;--no-border:#f4a0c0;--no-text:#8c2850;
    --maybe-bg:#f2eeff;--maybe-border:#b890e0;--maybe-text:#5838a8;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Nunito',sans-serif;
    min-height:100vh;
    background:#0c0616;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative;
  }
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{
    position:absolute;border-radius:50%;background:#fff;
    animation:twinkle var(--d,3s) var(--delay,0s) infinite ease-in-out alternate;
  }
  @keyframes twinkle{0%{opacity:.07;transform:scale(.8)}100%{opacity:.9;transform:scale(1.3)}}
  .float-paw{
    position:fixed;font-size:18px;opacity:0;pointer-events:none;z-index:0;
    animation:floatUp var(--fd,4s) var(--fdelay,0s) infinite ease-in;
  }
  @keyframes floatUp{
    0%{opacity:0;transform:translateY(0) rotate(var(--rot,0deg)) scale(.7)}
    15%{opacity:.18}85%{opacity:.06}
    100%{opacity:0;transform:translateY(-130px) rotate(calc(var(--rot,0deg)+20deg)) scale(1)}
  }
  .card{
    position:relative;z-index:10;
    background:linear-gradient(160deg,#180d2c 0%,#110820 55%,#160a26 100%);
    border-radius:32px;
    border:1px solid rgba(170,130,240,.2);
    padding:2.4rem 2rem 2rem;
    width:min(440px,94vw);
    display:flex;flex-direction:column;align-items:center;gap:1.05rem;
    box-shadow:0 0 70px rgba(130,70,220,.13),0 0 140px rgba(100,50,190,.07),
               inset 0 1px 0 rgba(200,160,255,.1);
  }
  .card::before{
    content:'';position:absolute;inset:-1.5px;border-radius:34px;
    background:linear-gradient(135deg,rgba(190,150,255,.28),rgba(150,110,240,.1),rgba(210,170,255,.13),rgba(140,90,230,.22));
    z-index:-1;
  }
  .oracle-title{
    font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;
    color:#d4b0ff;letter-spacing:.1em;text-align:center;
    text-shadow:0 0 24px rgba(180,120,255,.45),0 0 48px rgba(160,100,255,.2);
  }
  .oracle-sub{
    font-size:12px;color:#7a6090;text-align:center;margin-top:-.4rem;
    letter-spacing:.05em;font-style:italic;
  }

  /* cat */
  .cat-stage{
    cursor:pointer;width:200px;height:210px;position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  .cat-stage::after{
    content:'';position:absolute;inset:20px;border-radius:50%;
    background:radial-gradient(circle,rgba(180,120,255,.1) 0%,transparent 70%);
    pointer-events:none;animation:glowPulse 3s ease-in-out infinite alternate;
  }
  @keyframes glowPulse{0%{opacity:.4;transform:scale(.93)}100%{opacity:1;transform:scale(1.07)}}
  @keyframes bounce{
    0%,100%{transform:translateY(0) rotate(0deg)}
    18%{transform:translateY(-18px) rotate(-6deg)}
    36%{transform:translateY(-10px) rotate(5deg)}
    54%{transform:translateY(-20px) rotate(-4deg)}
    72%{transform:translateY(-8px)  rotate(3deg)}
    88%{transform:translateY(-4px)  rotate(-1deg)}
  }
  /* SYNCED blink — same delay, same timing */
  @keyframes eyeBlink{
    0%,80%,100%{transform:scaleY(1)}
    88%{transform:scaleY(0.04)}
  }
  .bouncing{animation:bounce .75s cubic-bezier(.36,.07,.19,.97)}
  .eye-l{animation:eyeBlink 4.5s 0s infinite;transform-origin:68px 91px}
  .eye-r{animation:eyeBlink 4.5s 0s infinite;transform-origin:112px 91px}

  .sparkle{position:absolute;pointer-events:none;animation:sparkOut .9s ease forwards}
  @keyframes sparkOut{
    0%{opacity:1;transform:translate(0,0) scale(1)}
    100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(.15)}
  }

  /* input */
  .q-row{display:flex;gap:8px;width:100%}
  .q-input{
    flex:1;padding:11px 18px;border-radius:50px;
    border:1px solid rgba(170,130,255,.25);
    background:rgba(255,255,255,.05);
    color:#ddd0ff;font-family:'Nunito',sans-serif;font-size:14px;outline:none;
    transition:border-color .2s,box-shadow .2s;
  }
  .q-input::placeholder{color:#5a4070}
  .q-input:focus{border-color:rgba(170,120,255,.5);box-shadow:0 0 0 3px rgba(150,90,255,.1)}
  .ask-btn{
    padding:11px 22px;border-radius:50px;border:none;
    background:linear-gradient(135deg,#8858c8,#5828a0);
    color:#ecdeff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
    cursor:pointer;white-space:nowrap;letter-spacing:.02em;
    transition:opacity .2s,transform .1s,box-shadow .2s;
    box-shadow:0 4px 18px rgba(110,50,200,.45);
  }
  .ask-btn:hover{opacity:.9;box-shadow:0 6px 24px rgba(120,60,210,.55)}
  .ask-btn:active{transform:scale(.96)}
  .ask-btn:disabled{opacity:.4;cursor:default}

  /* bubble */
  .bubble-wrap{min-height:68px;width:100%;display:flex;align-items:center;justify-content:center}
  .bubble{
    border-radius:20px;border-width:1px;border-style:solid;
    padding:13px 22px;font-size:14.5px;font-weight:600;text-align:center;
    line-height:1.5;width:100%;position:relative;
    animation:bubbleIn .38s cubic-bezier(.34,1.56,.64,1);
  }
  .bubble::before{
    content:'';position:absolute;top:-11px;left:50%;transform:translateX(-50%);
    border:9px solid transparent;border-bottom-width:0;border-top-width:11px;
  }
  @keyframes bubbleIn{0%{opacity:0;transform:scale(.84) translateY(8px)}100%{opacity:1;transform:scale(1) translateY(0)}}
  .bubble.yes{background:var(--yes-bg);border-color:var(--yes-border);color:var(--yes-text)}
  .bubble.no{background:var(--no-bg);border-color:var(--no-border);color:var(--no-text)}
  .bubble.maybe{background:var(--maybe-bg);border-color:var(--maybe-border);color:var(--maybe-text)}
  .bubble.yes::before{border-top-color:var(--yes-border)}
  .bubble.no::before{border-top-color:var(--no-border)}
  .bubble.maybe::before{border-top-color:var(--maybe-border)}

  .hint{font-size:12px;color:#4a3660;text-align:center;letter-spacing:.01em}

  @keyframes tailWag{
    0%,100%{transform:rotate(0deg)}
    25%{transform:rotate(18deg)}75%{transform:rotate(-14deg)}
  }
  .wagging #luna-tail{animation:tailWag .25s ease-in-out 3;transform-origin:88px 158px}
</style>
</head>

})();

let used=[],busy=false;

function pickFresh(){
  if(used.length===ANSWERS.length)used=[];
  const pool=ANSWERS.filter((_,i)=>!used.includes(i));
  const pick=pool[Math.floor(Math.random()*pool.length)];
  used.push(ANSWERS.indexOf(pick));
  return pick;
}

const SPARKS=['✦','✧','⋆','✩','☽','·','*','°'];
function spawnSparkles(stage){
  const w=stage.offsetWidth,h=stage.offsetHeight;
  const cx=w/2,cy=h/2;
  for(let i=0;i<10;i++){
    const sp=document.createElement('span');sp.className='sparkle';
    const angle=(Math.PI*2/10)*i+Math.random()*.5;
    const dist=58+Math.random()*40;
    sp.textContent=SPARKS[Math.floor(Math.random()*SPARKS.length)];
    sp.style.cssText=`left:${cx}px;top:${cy}px;color:${['#fad838','#c0a8ff','#e0b0ff','#fff8c0','#a8c0ff'][i%5]};font-size:${10+Math.random()*12}px;--sx:${Math.cos(angle)*dist}px;--sy:${Math.sin(angle)*dist}px;`;
    stage.appendChild(sp);
    setTimeout(()=>sp.remove(),960);
  }
}

function askCat(){
  if(busy)return;
  const stage=document.getElementById('catStage');
  const btn=document.getElementById('askBtn');
  const wrap=document.getElementById('bubbleWrap');
  busy=true;btn.disabled=true;wrap.innerHTML='';
  stage.classList.add('bouncing','wagging');
  setTimeout(()=>{
    stage.classList.remove('bouncing','wagging');
    spawnSparkles(stage);
    const ans=pickFresh();
    const b=document.createElement('div');
    b.className=`bubble ${ans.v}`;b.textContent=ans.t;
    wrap.appendChild(b);
    busy=false;btn.disabled=false;
  },760);
}

document.getElementById('question').addEventListener('keydown',e=>{
  if(e.key==='Enter')askCat();
});
</script>
