<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  :root {
    --bg-1: #fff9f0;
    --bg-2: #f6f3ff;
    --card: #fffefb;
    --ink: #2f2a3a;
    --muted: #7e7890;
    --line: #d9cde8;
    --accent: #ff9fbe;
    --accent-2: #8fd7ff;
    --accent-3: #b9f0be;
    --yes-bg: #eefcf0;
    --yes-line: #91d2a0;
    --yes-ink: #2d6d3c;
    --no-bg: #fff2f5;
    --no-line: #f4a8bc;
    --no-ink: #8e3550;
    --maybe-bg: #f3f1ff;
    --maybe-line: #c4b3f4;
    --maybe-ink: #55408e;
  }

  * { box-sizing: border-box; }

  .luna-wrap {
    font-family: 'VT323', monospace;
    color: var(--ink);
    width: min(740px, 100%);
    margin: 0 auto;
    padding: 20px;
    border: 3px solid var(--line);
    background:
      linear-gradient(0deg, rgba(255,255,255,0.45), rgba(255,255,255,0.45)),
      repeating-linear-gradient(45deg, #fff 0 8px, #fff8ff 8px 16px);
    box-shadow: 0 6px 0 #e8def5, 0 0 0 6px #fff;
    border-radius: 16px;
  }

  .luna-title {
    font-family: 'Press Start 2P', cursive;
    font-size: clamp(14px, 2vw, 18px);
    line-height: 1.5;
    margin: 0 0 8px;
    text-align: center;
    color: #5f4f73;
    text-shadow: 2px 2px 0 #fff;
  }

  .luna-sub {
    margin: 0 0 16px;
    text-align: center;
    color: var(--muted);
    font-size: 24px;
  }

  .luna-panel {
    display: grid;
    gap: 14px;
    grid-template-columns: 1fr auto;
    align-items: center;
  }

  .q-input {
    width: 100%;
    border: 3px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    padding: 12px 14px;
    font-size: 26px;
    color: var(--ink);
    outline: none;
  }

  .q-input:focus { border-color: #bba7eb; }

  .ask-btn {
    font-family: 'Press Start 2P', cursive;
    font-size: 11px;
    border: 3px solid #8fc2d8;
    border-radius: 12px;
    padding: 14px 16px;
    color: #2e4455;
    background: linear-gradient(180deg, #d7f3ff, #b7e7fb);
    cursor: pointer;
    transition: transform .08s ease;
  }

  .ask-btn:active { transform: translateY(2px); }

  .stage {
    margin-top: 12px;
    display: grid;
    place-items: center;
    gap: 10px;
  }

  .cat-btn {
    border: 0;
    background: transparent;
    padding: 0;
    cursor: pointer;
  }

  #lunaSvg { width: 190px; height: 190px; image-rendering: pixelated; }

  .idle-float { animation: idleFloat 2.8s ease-in-out infinite; }
  .blink { animation: blink 4.8s steps(1, end) infinite; transform-origin: center; }
  .wiggle { animation: wiggle .42s steps(2, end); }

  @keyframes idleFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    94% { transform: scaleY(0.15); }
  }
  @keyframes wiggle {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
    75% { transform: rotate(-1deg); }
    100% { transform: rotate(0deg); }
  }

  .answer {
    min-height: 76px;
    width: min(470px, 100%);
    border: 3px solid var(--line);
    border-radius: 12px;
    background: #fff;
    padding: 12px 14px;
    font-size: 29px;
    line-height: 1.15;
    display: grid;
    gap: 8px;
    align-content: center;
  }

  .tone-tag {
    font-family: 'Press Start 2P', cursive;
    font-size: 9px;
    letter-spacing: .04em;
    width: fit-content;
    padding: 6px 8px;
    border-radius: 8px;
    border: 2px solid;
  }

  .meta {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 22px;
    color: var(--muted);
  }

  .log {
    margin-top: 8px;
    border: 3px solid var(--line);
    border-radius: 12px;
    background: #fff;
    padding: 10px 12px;
  }

  .log h4 {
    margin: 0 0 8px;
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    color: #6b5f80;
  }

  .log ul {
    margin: 0;
    padding-left: 18px;
    font-size: 22px;
    color: #5b5569;
  }

  .hint {
    text-align: center;
    font-size: 20px;
    color: var(--muted);
    margin-top: 8px;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    border: 0;
    padding: 0;
    clip: rect(0, 0, 0, 0);
    overflow: hidden;
  }

  @media (max-width: 640px) {
    .luna-panel { grid-template-columns: 1fr; }
    .ask-btn { width: 100%; }
  }
</style>

<div class="luna-wrap">
  <h2 class="sr-only">Luna - the Oracle Kitty</h2>
  <h3 class="luna-title">Luna - the Oracle Kitty</h3>
  <p class="luna-sub">Tap Luna for a tiny prophecy with attitude.</p>

  <div class="luna-panel">
    <input class="q-input" id="catq" type="text" placeholder="Ask Luna anything..." />
    <button class="ask-btn" id="askBtn">ASK LUNA</button>
  </div>

  <div class="stage">
    <button class="cat-btn idle-float" id="catWrap" aria-label="Ask Luna">
      <svg id="lunaSvg" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
        <rect x="33" y="40" width="24" height="24" fill="#ffd3e2"/>
        <rect x="123" y="40" width="24" height="24" fill="#ffd3e2"/>
        <rect x="40" y="50" width="100" height="94" rx="16" fill="#ffe7f0" stroke="#d8bed4" stroke-width="3"/>
        <rect x="54" y="90" width="72" height="42" rx="18" fill="#fff5fa"/>
        <circle cx="66" cy="84" r="8" fill="#fff"/>
        <circle cx="114" cy="84" r="8" fill="#fff"/>
        <g class="blink">
          <rect x="62" y="80" width="8" height="10" rx="2" fill="#5b4f79"/>
          <rect x="110" y="80" width="8" height="10" rx="2" fill="#5b4f79"/>
        </g>
        <rect x="86" y="95" width="8" height="6" rx="2" fill="#f193b1"/>
        <path d="M78 102 Q90 112 102 102" stroke="#bb6d8d" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M48 100 L76 102 M48 108 L76 108 M132 100 L104 102 M132 108 L104 108" stroke="#c6a7bd" stroke-width="2" />
        <circle cx="54" cy="98" r="5" fill="#ffb6cb" opacity=".45"/>
        <circle cx="126" cy="98" r="5" fill="#ffb6cb" opacity=".45"/>
        <ellipse cx="90" cy="162" rx="35" ry="6" fill="#d6cae8" opacity=".45"/>
      </svg>
    </button>

    <div class="answer" id="catAnswer">
      <span class="tone-tag" id="toneTag">READY</span>
      <span id="answerText">Luna is listening.</span>
    </div>

    <div class="meta">
      <span id="mood">Mood: Soft chaos</span>
      <span id="countBadge">0 / 30 discovered</span>
    </div>
  </div>

  <div class="log">
    <h4>RECENT WHISPERS</h4>
    <ul id="historyList"><li>No prophecies yet.</li></ul>
  </div>

  <p class="hint">Press Enter, Space, or click Luna.</p>
</div>

<script>
  const responses = [
    ["Yes. Quietly confident yes.", "yes"],
    ["Green light. Keep it simple and move.", "yes"],
    ["Very yes. Luna already approved this plan.", "yes"],
    ["Yes, with good timing.", "yes"],
    ["Yes. You are not overthinking this one.", "yes"],
    ["No. Save your energy for a better idea.", "no"],
    ["Hard no. That's a future headache.", "no"],
    ["Not today. Let this one pass.", "no"],
    ["No, and Luna rarely repeats herself.", "no"],
    ["No. Your peace is worth more.", "no"],
    ["Maybe. Ask after a snack and a walk.", "maybe"],
    ["Could go either way. Test a tiny version first.", "maybe"],
    ["Unclear. Give it one more day.", "maybe"],
    ["Maybe. Good idea, wrong timing.", "maybe"],
    ["Fuzzy signal. Try a cleaner question.", "maybe"],
    ["Yes. Someone will notice your effort.", "yes"],
    ["No. That's a detour in cute packaging.", "no"],
    ["Maybe, but only if you keep it low drama.", "maybe"],
    ["Yes. Tiny steps win this one.", "yes"],
    ["No. Luna says protect your schedule.", "no"],
    ["Maybe. Ask your future self in 24 hours.", "maybe"],
    ["Yes. This has cozy momentum.", "yes"],
    ["No. The vibe check failed.", "no"],
    ["Maybe. Needs one practical tweak.", "maybe"],
    ["Yes. You are ready enough.", "yes"],
    ["No. Respectfully, absolutely not.", "no"],
    ["Maybe. Start small and let it grow.", "maybe"],
    ["Yes. Quietly iconic move.", "yes"],
    ["No. That's glitter on a bad plan.", "no"],
    ["Maybe. Data first, confidence second.", "maybe"]
  ];

  const toneStyles = {
    yes:   { bg: "var(--yes-bg)", line: "var(--yes-line)", ink: "var(--yes-ink)", label: "YES ENERGY" },
    no:    { bg: "var(--no-bg)", line: "var(--no-line)", ink: "var(--no-ink)", label: "NOPE SIGNAL" },
    maybe: { bg: "var(--maybe-bg)", line: "var(--maybe-line)", ink: "var(--maybe-ink)", label: "MAYBE CLOUD" }
  };

  const moods = ["Mint Mischief", "Soft Chaos", "Polite Menace", "Velvet Confidence", "Warm Stardust"];
  document.getElementById("mood").textContent = "Mood: " + moods[Math.floor(Math.random() * moods.length)];

  const used = new Set();
  const history = [];
  let busy = false;

  function pickFresh() {
    if (used.size === responses.length) used.clear();
    let i = Math.floor(Math.random() * responses.length);
    while (used.has(i)) i = Math.floor(Math.random() * responses.length);
    used.add(i);
    return responses[i];
  }

  function renderHistory() {
    const ul = document.getElementById("historyList");
    if (!history.length) {
      ul.innerHTML = "<li>No prophecies yet.</li>";
      return;
    }
    ul.innerHTML = history.slice(-4).reverse().map(item => `<li>${item}</li>`).join("");
  }

  function askCat() {
    if (busy) return;
    busy = true;

    const [text, tone] = pickFresh();
    const c = toneStyles[tone];
    const answer = document.getElementById("catAnswer");
    const toneTag = document.getElementById("toneTag");
    const answerText = document.getElementById("answerText");
    const wrap = document.getElementById("catWrap");
    const count = document.getElementById("countBadge");

    wrap.classList.add("wiggle");

    setTimeout(() => {
      answer.style.background = c.bg;
      answer.style.borderColor = c.line;
      answerText.style.color = c.ink;
      toneTag.textContent = c.label;
      toneTag.style.background = "#fff";
      toneTag.style.borderColor = c.line;
      toneTag.style.color = c.ink;
      answerText.textContent = text;
      count.textContent = `${used.size} / ${responses.length} discovered`;
      history.push(text);
      renderHistory();
      wrap.classList.remove("wiggle");
      busy = false;
    }, 260);
  }

  document.getElementById("askBtn").addEventListener("click", askCat);
  document.getElementById("catWrap").addEventListener("click", askCat);
  document.getElementById("catq").addEventListener("keydown", (e) => {
    if (e.key === "Enter") askCat();
  });
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      e.preventDefault();
      askCat();
    }
  });
</script>
