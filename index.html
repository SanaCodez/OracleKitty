<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Poppins:wght@500;700&family=Quicksand:wght@500;700&display=swap');

  :root{
    --cream:#F5EFE6;
    --beige:#EADFD3;
    --taupe:#C8B6A6;
    --blush:#EFA7B4;
    --brown:#7A6254;
    --brown-dark:#5A4A40;
    --sage:#A9BFA9;
    --lav:#B7A9C9;
    --ink:#5A4A40;
    --white:#fffdf9;
    --shadow:0 8px 24px rgba(122,98,84,.12);
    --soft:0 4px 12px rgba(122,98,84,.08);
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:linear-gradient(180deg,var(--cream),#f8f3eb 45%,var(--beige));
    color:var(--ink);
    font-family:'Nunito',sans-serif;
  }

  .cat-wrap{
    max-width:680px;
    margin:28px auto;
    padding:28px 20px 24px;
    border-radius:28px;
    background:var(--white);
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
  }

  .cat-title{
    font-family:'Poppins',sans-serif;
    font-size:28px;
    line-height:1.1;
    color:var(--brown-dark);
    margin:0;
    letter-spacing:.2px;
    text-align:center;
  }

  .cat-subtitle{
    margin:-4px 0 8px;
    color:#8c776a;
    font-size:15px;
    text-align:center;
  }

  .q-row{
    width:100%;
    max-width:520px;
    display:flex;
    gap:10px;
  }

  .q-row input{
    flex:1;
    min-width:0;
    border:1.5px solid #dbcdbf;
    border-radius:999px;
    padding:13px 16px;
    background:#fffaf4;
    color:var(--ink);
    font-size:15px;
    font-family:'Quicksand',sans-serif;
    outline:none;
    box-shadow:var(--soft);
  }

  .q-row input:focus{
    border-color:var(--sage);
    box-shadow:0 0 0 4px rgba(169,191,169,.15);
  }

  .ask-btn{
    border:0;
    border-radius:999px;
    padding:12px 18px;
    background:linear-gradient(180deg,#d8e8d7,var(--sage));
    color:#3f5342;
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    cursor:pointer;
    box-shadow:var(--soft);
    transition:transform .12s ease,filter .2s ease;
    min-height:44px;
  }

  .ask-btn:hover{ filter:brightness(.98); }
  .ask-btn:active{ transform:translateY(1px) scale(.985); }

  .cat-zone{
    position:relative;
    width:220px;
    height:220px;
    display:grid;
    place-items:center;
  }

  .cat-container{
    cursor:pointer;
    width:200px;
    height:200px;
    border-radius:24px;
    display:grid;
    place-items:center;
    animation:floaty 3.1s ease-in-out infinite;
  }

  #catSvg{ width:100%; height:100%; overflow:visible; }

  .eye-group{
    animation:blink 4.8s infinite;
    transform-origin:center;
  }

  .thinking #tail{
    animation:tailWiggle .45s ease-in-out infinite;
    transform-origin:123px 138px;
  }

  .responding .blush{
    animation:blushPulse .65s ease-in-out 4;
  }

  .sparkle{
    position:absolute;
    font-size:18px;
    color:var(--lav);
    opacity:.75;
    user-select:none;
    pointer-events:none;
    animation:twinkle 2.8s ease-in-out infinite;
  }
  .sparkle.s1{ top:18px; left:24px; animation-delay:0s; }
  .sparkle.s2{ top:32px; right:20px; animation-delay:.7s; }
  .sparkle.s3{ right:10px; bottom:34px; animation-delay:1.2s; }
  .sparkle.s4{ left:8px; bottom:40px; animation-delay:1.8s; }

  .answer-shell{
    width:100%;
    max-width:520px;
    border:1.5px solid #e2d7ca;
    border-radius:24px;
    background:#fffaf6;
    box-shadow:var(--soft);
    padding:14px 16px;
    min-height:76px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .answer-bubble{
    width:100%;
    text-align:center;
    color:#664f43;
    line-height:1.5;
    font-size:16px;
    font-family:'Poppins',sans-serif;
  }

  .typing{
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:#907d71;
    font-family:'Quicksand',sans-serif;
    font-weight:700;
  }

  .dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:#bfaea0;
    animation:dots 1s infinite;
  }
  .dot:nth-child(2){ animation-delay:.2s; }
  .dot:nth-child(3){ animation-delay:.4s; }

  .count-badge{
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size:12px;
    color:#8f7a6f;
    background:#f8f2eb;
    border:1.5px solid #e2d6cb;
    border-radius:999px;
    padding:5px 12px;
  }

  .hint-text{
    color:#9c877b;
    font-size:12px;
    text-align:center;
    margin:0;
  }

  @keyframes floaty{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-5px); }
  }

  @keyframes blink{
    0%,90%,100%{ transform:scaleY(1); }
    94%{ transform:scaleY(.08); }
  }

  @keyframes tailWiggle{
    0%,100%{ transform:rotate(0deg); }
    25%{ transform:rotate(-8deg); }
    50%{ transform:rotate(4deg); }
    75%{ transform:rotate(-5deg); }
  }

  @keyframes blushPulse{
    0%,100%{ transform:scale(1); opacity:.85; }
    50%{ transform:scale(1.1); opacity:1; }
  }

  @keyframes twinkle{
    0%,100%{ transform:translateY(0) scale(1); opacity:.35; }
    50%{ transform:translateY(-6px) scale(1.08); opacity:.9; }
  }

  @keyframes dots{
    0%,80%,100%{ transform:translateY(0); opacity:.45; }
    40%{ transform:translateY(-4px); opacity:1; }
  }

  @media (max-width:640px){
    .cat-wrap{ margin:12px; padding:20px 14px 18px; border-radius:22px; gap:12px; }
    .cat-title{ font-size:23px; }
    .cat-subtitle{ font-size:14px; }
    .q-row{ flex-direction:column; }
    .ask-btn{ width:100%; }
    .cat-zone{ width:190px; height:190px; }
    .cat-container{ width:180px; height:180px; }
    .answer-shell{ min-height:84px; border-radius:20px; }
    .answer-bubble{ font-size:15px; }
  }
</style>

<div class="cat-wrap">
  <h2 class="cat-title">Mochi the Siamese</h2>
  <p class="cat-subtitle">playful, a little wise, and mildly dramatic</p>

  <div class="q-row">
    <input id="catq" type="text" placeholder="Ask Mochi anything..." />
    <button class="ask-btn" id="askBtn" type="button">Ask Mochi</button>
  </div>

  <div class="cat-zone">
    <span class="sparkle s1">✦</span>
    <span class="sparkle s2">♪</span>
    <span class="sparkle s3">✧</span>
    <span class="sparkle s4">♫</span>

    <div class="cat-container" id="catWrap" role="button" tabindex="0" aria-label="Ask Mochi">
      <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" id="catSvg">
        <!-- tail -->
        <path id="tail" d="M127 116 C151 110, 153 143, 131 154 C121 159, 118 150, 126 144 C134 138, 136 127, 127 116Z"
          fill="#7A6254" stroke="#5A4A40" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M131 126 C141 126, 144 133, 138 137 C133 140, 128 137, 131 126Z" fill="#C8B6A6" opacity=".35"/>

        <!-- body -->
        <path d="M54 106 C44 121, 39 139, 46 154 C54 171, 72 171, 89 170 C108 170, 124 170, 132 159 C138 150, 138 129, 126 112
                 C120 103, 106 99, 90 99 C74 99, 61 100, 54 106Z"
          fill="#F5EFE6" stroke="#5A4A40" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- head -->
        <path d="M42 49 C42 35, 50 25, 61 32 L73 40 C84 36, 96 36, 107 40 L118 31 C129 23, 138 33, 138 47
                 L137 91 C137 102, 126 109, 90 109 C54 109, 43 102, 43 91 Z"
          fill="#F5EFE6" stroke="#5A4A40" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- ears -->
        <path d="M44 34 C50 21, 63 24, 69 40 C58 46, 48 45, 44 34Z" fill="#7A6254"/>
        <path d="M111 40 C117 23, 131 22, 136 35 C132 45, 121 46, 111 40Z" fill="#7A6254"/>

        <!-- face mask -->
        <ellipse cx="90" cy="76" rx="41" ry="30" fill="#7A6254"/>

        <!-- eyes blue + blink -->
        <g class="eye-group">
          <ellipse cx="73" cy="77" rx="8.2" ry="7.2" fill="#7BC2E8"/>
          <ellipse cx="107" cy="77" rx="8.2" ry="7.2" fill="#7BC2E8"/>
          <ellipse cx="73" cy="78" rx="3.1" ry="3.3" fill="#39566B"/>
          <ellipse cx="107" cy="78" rx="3.1" ry="3.3" fill="#39566B"/>
          <circle cx="71" cy="75.5" r="1.3" fill="#fff"/>
          <circle cx="105" cy="75.5" r="1.3" fill="#fff"/>
        </g>

        <!-- mouth -->
        <path d="M86 87 Q90 92 94 87" stroke="#2F2622" stroke-width="3.2" fill="none" stroke-linecap="round"/>
        <path d="M82 84 Q84 88 88 86" stroke="#2F2622" stroke-width="3.2" fill="none" stroke-linecap="round"/>
        <path d="M98 84 Q96 88 92 86" stroke="#2F2622" stroke-width="3.2" fill="none" stroke-linecap="round"/>

        <!-- blush -->
        <g class="blush-group">
          <ellipse class="blush" cx="58" cy="88" rx="10" ry="8" fill="#EFA7B4" opacity=".85"/>
          <ellipse class="blush" cx="122" cy="88" rx="10" ry="8" fill="#EFA7B4" opacity=".85"/>
          <line x1="54" y1="84" x2="50" y2="90" stroke="#D48A9B" stroke-width="2" stroke-linecap="round"/>
          <line x1="59" y1="84" x2="55" y2="91" stroke="#D48A9B" stroke-width="2" stroke-linecap="round"/>
          <line x1="64" y1="84" x2="60" y2="91" stroke="#D48A9B" stroke-width="2" stroke-linecap="round"/>
          <line x1="118" y1="84" x2="114" y2="90" stroke="#D48A9B" stroke-width="2" stroke-linecap="round"/>
          <line x1="123" y1="84" x2="119" y2="91" stroke="#D48A9B" stroke-width="2" stroke-linecap="round"/>
          <line x1="128" y1="84" x2="124" y2="91" stroke="#D48A9B" stroke-width="2" stroke-linecap="round"/>
        </g>

        <!-- paw + patch -->
        <ellipse cx="76" cy="167" rx="9" ry="8" fill="#7A6254"/>
        <path d="M117 120 C110 123, 104 129, 101 136" stroke="#5A4A40" stroke-width="6" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="answer-shell">
    <div class="answer-bubble" id="catAnswer">Mochi is listening...</div>
  </div>

  <div id="countWrap" style="display:none;"><span class="count-badge" id="countBadge"></span></div>
  <p class="hint-text">Tap Mochi or press Enter</p>
</div>

<script>
  const all = [
    ["Very yes. Move quietly and win loudly.", "yes"],
    ["Yes, but keep one eyebrow raised.", "yes"],
    ["Mochi approves. Proceed with tasteful confidence.", "yes"],
    ["No. That idea smells like extra chaos.", "no"],
    ["Not today. Protect your peace and snacks.", "no"],
    ["Mochi says no, and Mochi is rarely wrong.", "no"],
    ["Maybe. The moon is undecided.", "maybe"],
    ["Possible... ask again after tea.", "maybe"],
    ["Hmm. The path exists, but it wiggles.", "maybe"],
    ["Yes. Destiny just sent a soft nudge.", "yes"],
    ["Nope. Cute thought, risky execution.", "no"],
    ["Maybe. Keep it mysterious and test small.", "maybe"]
  ];

  let used = [];
  let busy = false;

  function pickFresh() {
    if (used.length === all.length) used = [];
    const pool = all.filter((_, i) => !used.includes(i));
    const pick = pool[Math.floor(Math.random() * pool.length)];
    const idx = all.indexOf(pick);
    used.push(idx);
    return pick;
  }

  function typingDots(el) {
    el.innerHTML = `
      <span class="typing">
        Mochi is thinking
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </span>`;
  }

  function typeText(el, text, speed = 24) {
    el.textContent = "";
    let i = 0;
    const timer = setInterval(() => {
      el.textContent += text[i] || "";
      i++;
      if (i > text.length) clearInterval(timer);
    }, speed);
  }

  function askCat() {
    if (busy) return;
    busy = true;

    const wrap = document.getElementById("catWrap");
    const ans = document.getElementById("catAnswer");
    const cw = document.getElementById("countWrap");
    const cb = document.getElementById("countBadge");

    wrap.classList.add("thinking");
    typingDots(ans);

    setTimeout(() => {
      const [text] = pickFresh();
      wrap.classList.remove("thinking");
      wrap.classList.add("responding");
      typeText(ans, text, 22);
      cw.style.display = "block";
      cb.textContent = `${used.length} of ${all.length} answers discovered`;
      setTimeout(() => {
        wrap.classList.remove("responding");
        busy = false;
      }, 900);
    }, 920);
  }

  document.getElementById("askBtn").addEventListener("click", askCat);
  document.getElementById("catWrap").addEventListener("click", askCat);
  document.getElementById("catWrap").addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      askCat();
    }
  });
  document.getElementById("catq").addEventListener("keydown", (e) => {
    if (e.key === "Enter") askCat();
  });
</script>
